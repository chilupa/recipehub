name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Print versions
        run: npm run version:print

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for user-facing changes.

            Fill in store build numbers after native archives:

            | Platform | Version | Build |
            | -------- | ------- | ----- |
            | Web/JS   | ${{ steps.version.outputs.tag }} | (package.json) |
            | Android  | ${{ steps.version.outputs.tag }} | _TBD_ |
            | iOS      | ${{ steps.version.outputs.tag }} | _TBD_ |

            ## Store status
            - [ ] Google Play
            - [ ] TestFlight / App Store

            ## Build locally
            ```bash
            npm run build:sync
            ```
            Then archive in Android Studio / Xcode. See [docs/release.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/release.md).
